<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>GroWthink 🌱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Nunito',sans-serif;
  background:#1a1a2e;
  color:#eee;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

.app{max-width:500px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{text-align:center;padding:12px 0 8px}
.header h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#00b894,#55efc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .streak{font-size:0.85rem;color:#888;margin-top:2px}

/* Plant container */
.plant-area{
  position:relative;
  height:220px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  margin:8px 0;
  overflow:hidden;
}

.ground{
  position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(180deg,#4a3728,#3d2e1f);
  border-radius:20px 20px 0 0;
}

.pot{
  position:absolute;bottom:25px;
  width:80px;height:55px;
  background:linear-gradient(180deg,#c0392b,#a93226);
  border-radius:0 0 15px 15px;
  z-index:2;
}
.pot::before{
  content:'';position:absolute;top:-8px;left:-5px;
  width:90px;height:12px;
  background:#e74c3c;border-radius:6px;
}

.plant{
  position:absolute;bottom:75px;
  display:flex;flex-direction:column;align-items:center;
  z-index:1;
  transition:all 1s ease;
}

.stem{
  width:4px;
  background:linear-gradient(180deg,#27ae60,#2ecc71);
  border-radius:2px;
  transition:height 1s ease;
}

.leaf{
  position:absolute;
  width:0;height:0;
  transition:all 0.8s ease;
}

.leaf-left{
  border-right:20px solid #27ae60;
  border-top:8px solid transparent;
  border-bottom:8px solid transparent;
  transform-origin:right center;
  right:2px;
}

.leaf-right{
  border-left:20px solid #2ecc71;
  border-top:8px solid transparent;
  border-bottom:8px solid transparent;
  transform-origin:left center;
  left:2px;
}

.flower{
  width:30px;height:30px;
  position:relative;
  transition:all 0.8s ease;
}

.petal{
  position:absolute;
  width:12px;height:12px;
  background:#f39c12;
  border-radius:50%;
}

.flower-center{
  position:absolute;
  width:10px;height:10px;
  background:#e74c3c;
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:1;
}

/* Health bar */
.health-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;margin:4px 0;
}
.health-label{font-size:0.8rem;color:#888;min-width:50px}
.health-track{flex:1;height:8px;background:#2d2d44;border-radius:4px;overflow:hidden}
.health-fill{height:100%;border-radius:4px;transition:width 0.5s ease,background 0.5s ease}
.health-value{font-size:0.8rem;color:#888;min-width:30px;text-align:right}

/* Stats */
.stats{
  display:flex;justify-content:space-around;
  padding:8px 0;margin:4px 0;
  border-top:1px solid #2d2d44;
  border-bottom:1px solid #2d2d44;
}
.stat{text-align:center}
.stat-num{font-size:1.3rem;font-weight:800;color:#55efc4}
.stat-label{font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:1px}

/* Notes section */
.notes-section{flex:1;display:flex;flex-direction:column;margin-top:8px}

.add-note{
  display:flex;gap:8px;margin-bottom:12px;
}

.add-note textarea{
  flex:1;
  background:#16213e;
  border:2px solid #2d2d44;
  border-radius:12px;
  color:#eee;
  padding:12px;
  font-family:'Nunito',sans-serif;
  font-size:0.95rem;
  resize:none;
  min-height:50px;
  max-height:120px;
  transition:border-color 0.3s;
}
.add-note textarea:focus{outline:none;border-color:#00b894}
.add-note textarea::placeholder{color:#555}

.add-note button{
  align-self:flex-end;
  width:50px;height:50px;
  border:none;border-radius:50%;
  background:linear-gradient(135deg,#00b894,#55efc4);
  color:#1a1a2e;
  font-size:1.5rem;
  font-weight:800;
  cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;
  flex-shrink:0;
}
.add-note button:active{transform:scale(0.9)}

.notes-list{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;gap:8px;
  padding-bottom:20px;
}

.note-card{
  background:#16213e;
  border-radius:12px;
  padding:12px;
  border-left:3px solid #00b894;
  animation:slideIn 0.3s ease;
}

@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.note-card .note-text{font-size:0.9rem;line-height:1.5;color:#ddd}
.note-card .note-meta{font-size:0.7rem;color:#666;margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.note-card .delete-btn{
  background:none;border:none;color:#555;font-size:0.8rem;cursor:pointer;padding:2px 6px;border-radius:4px;
}
.note-card .delete-btn:hover{color:#e74c3c;background:rgba(231,76,60,0.1)}

.empty-state{
  text-align:center;padding:40px 20px;color:#555;
}
.empty-state .emoji{font-size:3rem;margin-bottom:8px}
.empty-state p{font-size:0.9rem}

/* Withering effect */
.plant.withering .stem{background:linear-gradient(180deg,#7f6b3e,#8B7355)!important}
.plant.withering .leaf-left{border-right-color:#7f6b3e!important}
.plant.withering .leaf-right{border-left-color:#8B7355!important}

/* Particles */
.particle{
  position:absolute;
  pointer-events:none;
  border-radius:50%;
  animation:particleFloat 2s ease forwards;
}

@keyframes particleFloat{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(0.3)}
}

/* Confetti burst on level up */
.level-up-banner{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#00b894,#55efc4);
  color:#1a1a2e;padding:20px 40px;border-radius:20px;
  font-size:1.3rem;font-weight:800;
  z-index:100;
  animation:popIn 0.5s ease, popOut 0.5s ease 1.5s forwards;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,184,148,0.4);
}

@keyframes popIn{from{transform:translate(-50%,-50%) scale(0);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
@keyframes popOut{from{opacity:1}to{opacity:0;pointer-events:none}}

/* Tabs */
.tab-bar{
  display:flex;gap:4px;margin-bottom:8px;
}
.tab{
  flex:1;padding:8px;text-align:center;
  background:#16213e;border:none;border-radius:10px;
  color:#888;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;
}
.tab.active{background:#00b894;color:#1a1a2e}

.tab-content{display:none}
.tab-content.active{display:flex;flex-direction:column;flex:1}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🌱 GroWthink</h1>
    <div class="streak" id="streak">Start writing to grow your plant!</div>
  </div>

  <div class="plant-area" id="plant-area">
    <div class="ground"></div>
    <div class="pot"></div>
    <div class="plant" id="plant"></div>
  </div>

  <div class="health-bar">
    <span class="health-label">Health</span>
    <div class="health-track"><div class="health-fill" id="health-fill"></div></div>
    <span class="health-value" id="health-value">100%</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-notes">0</div>
      <div class="stat-label">Notes</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-streak">0</div>
      <div class="stat-label">Day Streak</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-level">1</div>
      <div class="stat-label">Level</div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" data-tab="write">✏️ Write</button>
    <button class="tab" data-tab="history">📚 History</button>
  </div>

  <div class="tab-content active" id="tab-write">
    <div class="add-note">
      <textarea id="note-input" placeholder="What's on your mind? 🌿" rows="2"></textarea>
      <button id="add-btn">+</button>
    </div>
    <div class="notes-list" id="today-notes"></div>
  </div>

  <div class="tab-content" id="tab-history">
    <div class="notes-list" id="all-notes"></div>
  </div>
</div>

<script>
// State
let state = JSON.parse(localStorage.getItem('growthink') || 'null') || {
  notes: [],
  health: 100,
  level: 1,
  xp: 0,
  streak: 0,
  lastNoteDate: null,
  createdAt: Date.now()
};

const plantEl = document.getElementById('plant');
const healthFill = document.getElementById('health-fill');
const healthValue = document.getElementById('health-value');
const streakEl = document.getElementById('streak');
const noteInput = document.getElementById('note-input');
const todayNotes = document.getElementById('today-notes');
const allNotes = document.getElementById('all-notes');

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab === 'history') renderAllNotes();
  });
});

// Add note
document.getElementById('add-btn').addEventListener('click', addNote);
noteInput.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); addNote(); }
});

function addNote(){
  const text = noteInput.value.trim();
  if(!text) return;

  const now = new Date();
  const today = now.toISOString().split('T')[0];

  // Check streak
  if(state.lastNoteDate){
    const last = new Date(state.lastNoteDate);
    const lastDay = last.toISOString().split('T')[0];
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toISOString().split('T')[0];

    if(lastDay === today){
      // Same day, no streak change
    } else if(lastDay === yesterdayStr){
      state.streak++;
    } else {
      state.streak = 1;
    }
  } else {
    state.streak = 1;
  }

  state.lastNoteDate = now.toISOString();

  const note = {
    id: Date.now(),
    text,
    date: now.toISOString(),
    day: today
  };

  state.notes.unshift(note);

  // Grow plant
  state.health = Math.min(100, state.health + 8);
  state.xp += 10 + Math.floor(text.length / 20);

  // Level up check
  const xpNeeded = state.level * 50;
  if(state.xp >= xpNeeded){
    state.xp -= xpNeeded;
    state.level++;
    showLevelUp();
  }

  save();
  noteInput.value = '';
  noteInput.style.height = 'auto';
  spawnParticles();
  render();
}

function deleteNote(id){
  state.notes = state.notes.filter(n => n.id !== id);
  save();
  render();
}

function save(){
  localStorage.setItem('growthink', JSON.stringify(state));
}

// Wither check
function witherCheck(){
  if(!state.lastNoteDate) return;
  const hours = (Date.now() - new Date(state.lastNoteDate).getTime()) / 3600000;
  if(hours > 12){
    const decay = Math.min(5, Math.floor((hours - 12) / 6) * 2);
    state.health = Math.max(0, state.health - decay);
    save();
  }
}

// Render plant
function renderPlant(){
  const level = state.level;
  const health = state.health;
  const isWithering = health < 40;

  let html = '';
  const stemHeight = Math.min(20 + level * 12, 130);
  html += `<div class="stem" style="height:${stemHeight}px"></div>`;

  // Leaves
  const leafCount = Math.min(Math.floor(level / 1.5), 6);
  for(let i = 0; i < leafCount; i++){
    const side = i % 2 === 0 ? 'left' : 'right';
    const y = stemHeight - 15 - (i * (stemHeight / (leafCount + 1)));
    const size = Math.max(12, 20 - i * 1.5);
    html += `<div class="leaf leaf-${side}" style="position:absolute;bottom:${y}px;border-${side === 'left' ? 'right' : 'left'}-width:${size}px;border-top-width:${size/2.5}px;border-bottom-width:${size/2.5}px"></div>`;
  }

  // Flower (level 5+)
  if(level >= 5){
    const flowerSize = Math.min(10 + (level - 5) * 3, 35);
    html += `<div class="flower" style="width:${flowerSize}px;height:${flowerSize}px;position:absolute;bottom:${stemHeight}px;left:50%;transform:translateX(-50%)">`;
    const petalCount = Math.min(4 + Math.floor((level-5)/2), 8);
    for(let i = 0; i < petalCount; i++){
      const angle = (360 / petalCount) * i;
      const colors = ['#f39c12','#e74c3c','#9b59b6','#3498db','#e91e63','#ff6b6b'];
      const color = colors[i % colors.length];
      const r = flowerSize * 0.35;
      const x = Math.cos(angle * Math.PI/180) * r + flowerSize/2 - 6;
      const y = Math.sin(angle * Math.PI/180) * r + flowerSize/2 - 6;
      html += `<div class="petal" style="left:${x}px;top:${y}px;background:${color};width:${flowerSize*0.4}px;height:${flowerSize*0.4}px"></div>`;
    }
    html += `<div class="flower-center" style="width:${flowerSize*0.35}px;height:${flowerSize*0.35}px"></div></div>`;
  }

  plantEl.innerHTML = html;
  plantEl.className = 'plant' + (isWithering ? ' withering' : '');
}

function renderHealth(){
  const h = state.health;
  healthFill.style.width = h + '%';
  healthFill.style.background = h > 60 ? 'linear-gradient(90deg,#00b894,#55efc4)' : h > 30 ? 'linear-gradient(90deg,#f39c12,#fdcb6e)' : 'linear-gradient(90deg,#e74c3c,#ff7675)';
  healthValue.textContent = Math.round(h) + '%';
}

function renderStats(){
  document.getElementById('stat-notes').textContent = state.notes.length;
  document.getElementById('stat-streak').textContent = state.streak;
  document.getElementById('stat-level').textContent = state.level;

  if(state.streak > 1){
    streakEl.textContent = `🔥 ${state.streak} day streak! Keep it going!`;
  } else if(state.notes.length === 0){
    streakEl.textContent = 'Start writing to grow your plant!';
  } else {
    streakEl.textContent = '🌱 Write daily to build your streak';
  }
}

function renderTodayNotes(){
  const today = new Date().toISOString().split('T')[0];
  const todayList = state.notes.filter(n => n.day === today);

  if(todayList.length === 0){
    todayNotes.innerHTML = '<div class="empty-state"><div class="emoji">🌿</div><p>No notes yet today.<br>Write something to feed your plant!</p></div>';
    return;
  }

  todayNotes.innerHTML = todayList.map(n => `
    <div class="note-card">
      <div class="note-text">${escHtml(n.text)}</div>
      <div class="note-meta">
        <span>${new Date(n.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
        <button class="delete-btn" onclick="deleteNote(${n.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function renderAllNotes(){
  if(state.notes.length === 0){
    allNotes.innerHTML = '<div class="empty-state"><div class="emoji">📝</div><p>Your notes will appear here</p></div>';
    return;
  }

  // Group by day
  const grouped = {};
  state.notes.forEach(n => {
    if(!grouped[n.day]) grouped[n.day] = [];
    grouped[n.day].push(n);
  });

  let html = '';
  Object.keys(grouped).sort().reverse().forEach(day => {
    const d = new Date(day + 'T12:00:00');
    const label = isToday(d) ? 'Today' : isYesterday(d) ? 'Yesterday' : d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
    html += `<div style="font-size:0.75rem;color:#555;text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px">${label} — ${grouped[day].length} notes</div>`;
    grouped[day].forEach(n => {
      html += `<div class="note-card">
        <div class="note-text">${escHtml(n.text)}</div>
        <div class="note-meta">
          <span>${new Date(n.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
          <button class="delete-btn" onclick="deleteNote(${n.id})">✕</button>
        </div>
      </div>`;
    });
  });
  allNotes.innerHTML = html;
}

function isToday(d){return d.toDateString()===new Date().toDateString()}
function isYesterday(d){const y=new Date();y.setDate(y.getDate()-1);return d.toDateString()===y.toDateString()}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

function spawnParticles(){
  const area = document.getElementById('plant-area');
  const colors = ['#55efc4','#00b894','#81ecec','#ffeaa7','#fdcb6e'];
  for(let i = 0; i < 8; i++){
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = (40 + Math.random() * 20) + '%';
      p.style.bottom = (60 + Math.random() * 20) + 'px';
      p.style.width = p.style.height = (4 + Math.random() * 6) + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      area.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }, i * 60);
  }
}

function showLevelUp(){
  const banner = document.createElement('div');
  banner.className = 'level-up-banner';
  banner.innerHTML = `🌟 Level ${state.level}!<br><span style="font-size:0.9rem;font-weight:600">Your plant is thriving!</span>`;
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 2200);
}

function render(){
  witherCheck();
  renderPlant();
  renderHealth();
  renderStats();
  renderTodayNotes();
}

// Auto-resize textarea
noteInput.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Wither timer
setInterval(() => { witherCheck(); renderHealth(); renderPlant(); }, 60000);

// Init
render();
</script>

</body>
</html>
